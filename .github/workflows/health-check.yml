name: Tier 1 — Health Check

on:
  schedule:
    # Every 30 min, 24/7. Earlier this was '*/30 6-22 + 0 1' to save GHA minutes,
    # but that left a 4.5h silent window 01:32–06:00 UTC (= 04:32–09:00 IDT) that
    # missed the v10.59.0 ship's CI-red on Geri main 2026-04-29. GHA free-tier
    # cost of 48 runs/day vs old 35/day is trivial; coverage is the win.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, skip issue creation (just write report)'
        type: boolean
        default: false

permissions:
  contents: write   # to commit health-reports/
  issues:  write    # to file/comment on issues across repos (PAT does the heavy lifting though)

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Run probe
        id: probe
        env:
          # MONITOR_PAT must have repo + issues scopes for ALL six target repos.
          # Stored in this repo's secrets. The default GITHUB_TOKEN is scoped to
          # this repo only and can't reach the others.
          GH_TOKEN: ${{ secrets.MONITOR_PAT }}
          DRY_RUN:  ${{ inputs.dry_run && '1' || '0' }}
          REPORT_DIR: health-reports
        run: |
          set +e
          python3 scripts/probe.py > /tmp/report.md
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit report
        # Always commit — green or red — so the report directory is the audit trail.
        # Use a small loop with rebase to dodge race conditions: every 30min cron
        # plus manual triggers can otherwise step on each other.
        run: |
          set +e
          git config user.email "auto-audit-bot@users.noreply.github.com"
          git config user.name  "auto-audit-bot"
          git add health-reports/
          if git diff --cached --quiet; then
            echo "No new report to commit"
            exit 0
          fi
          git commit -m "auto-audit: health report $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying after 5s…"
            sleep 5
          done
          echo "::warning::Could not push report after 3 retries — report still in workflow artifacts"
          exit 0   # don't fail the run on push race

      - name: Surface red findings as job summary
        if: always()
        run: |
          {
            echo "## Latest health report"
            echo ""
            cat /tmp/report.md || echo "(no report)"
          } >> $GITHUB_STEP_SUMMARY

      - name: Fail the run if any critical
        # Non-zero exit from probe.py == at least one critical finding.
        # Failing the run gives the standard GH Actions email/red-X surface.
        if: steps.probe.outputs.exit_code != '0'
        run: |
          echo "::error::Health check found critical issues (see job summary above)"
          exit 1
