name: Spend trend alarm

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC (~09:00 Israel)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-spend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Admin PAT so the spend snapshot push bypasses main's required
          # status check (enforce_admins off). Default GITHUB_TOKEN is blocked
          # by branch protection — see health-check.yml for the full rationale.
          token: ${{ secrets.MONITOR_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run spend check
        env:
          TORANOT_API_SECRET: ${{ secrets.TORANOT_API_SECRET }}
          MONITOR_PAT: ${{ secrets.MONITOR_PAT }}
        run: python scripts/spend_alarm.py
        continue-on-error: true

      - name: Commit snapshot
        run: |
          git config user.name "auto-audit-bot"
          git config user.email "auto-audit@noreply.github.com"
          git add health-reports/spend-*.json || true
          git diff --cached --quiet || git commit -m "chore: spend snapshot $(date +%Y-%m-%d)"
          git push || true
