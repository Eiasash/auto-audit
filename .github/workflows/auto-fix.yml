name: Tier 2 — Auto-fix dispatcher

# Triggered manually for now. To make fully autonomous, the Tier 1 probe would also
# fire a `repository_dispatch` event with the issue context, OR each watched repo would
# need a small forwarder workflow that listens for `labeled` events and dispatches here.
#
# This workflow does NOT push to main of any target repo. It always opens a PR.
# Set ANTHROPIC_API_KEY + MONITOR_PAT as repo secrets to enable.

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. FamilyMedicine, InternalMedicine, Geriatrics, ward-helper, Toranot, watch-advisor2)'
        type: choice
        options:
          - Geriatrics
          - InternalMedicine
          - FamilyMedicine
          - ward-helper
          - Toranot
          - watch-advisor2
        required: true
      issue_number:
        description: 'Issue number in the target repo (the auto-audit issue)'
        type: string
        required: true
      fix_kind:
        description: 'Fix template'
        type: choice
        options:
          - version_trinity     # bump APP_VERSION + sw.js CACHE to match package.json
          - sibling_sync        # propagate shared/fsrs.js or harrison_chapters.json to siblings
          - investigate         # general — Claude reads issue, audits, proposes fix
        default: version_trinity

permissions:
  contents: read

concurrency:
  group: auto-fix-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MONITOR_PAT: ${{ secrets.MONITOR_PAT }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Guard — secrets present
        run: |
          test -n "$MONITOR_PAT"        || { echo "::error::MONITOR_PAT not set"; exit 1; }
          # ANTHROPIC_API_KEY is only needed for the Claude-driven `investigate`
          # template. version_trinity and sibling_sync are deterministic shell
          # scripts that don't call Claude. Don't block them on a missing key.
          if [ "${{ inputs.fix_kind }}" = "investigate" ]; then
            test -n "$ANTHROPIC_API_KEY" || { echo "::error::ANTHROPIC_API_KEY required for fix_kind=investigate"; exit 1; }
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Eiasash/${{ inputs.target_repo }}
          token: ${{ secrets.MONITOR_PAT }}
          path: target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        working-directory: target
        run: npm ci || npm install --no-audit --no-fund

      # ── Fix template: version_trinity ──────────────────────────────
      # Reproduces what Claude did manually for FM v1.7.3:
      # find package.json version → bump APP_VERSION + sw.js CACHE to match.
      # No Claude needed; deterministic, safe, easy to review.
      - name: version_trinity fix
        if: inputs.fix_kind == 'version_trinity'
        working-directory: target
        run: |
          set -euo pipefail
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          # Pnimit-specific convention: pkg=X.Y.Z.0, APP_VERSION=X.Y.Z (memory:
          # regressionGuards.test.js:436 locks pkg=9.85.0.0 ↔ APP_VERSION=9.85.0).
          # FM and Geri use exact-match: pkg=X.Y.Z = APP_VERSION = sw.js CACHE.
          # The naive `${PKG_VER%.0}` shortest-suffix strip mangles Geri/FM
          # (10.47.0 → 10.47, 1.9.0 → 1.9). Normalize per-repo instead.
          case "${{ inputs.target_repo }}" in
            InternalMedicine)
              # Trim Pnimit's trailing 4th .0 if present.
              APP_VER="${PKG_VER%.0}"
              ;;
            *)
              # Everywhere else: package.json version IS the canonical APP_VERSION.
              APP_VER="$PKG_VER"
              ;;
          esac
          echo "package.json: $PKG_VER → APP_VERSION/CACHE: $APP_VER"
          # Repo-specific touchpoints
          case "${{ inputs.target_repo }}" in
            FamilyMedicine|InternalMedicine)
              sed -i -E "s/(APP_VERSION\s*=\s*')[^']+(')/\1${APP_VER}\2/" src/core/constants.js
              # BUILD_HASH (best-effort, matches FM/Pnimit conventions)
              sed -i -E "s/(BUILD_HASH\s*=\s*'[^-]+-v)[^']+(')/\1${APP_VER}\2/" src/core/constants.js || true
              if [ "${{ inputs.target_repo }}" = "FamilyMedicine" ]; then
                sed -i -E "s/(CACHE\s*=\s*'mishpacha-v)[^']+(')/\1${APP_VER}\2/" sw.js
              else
                sed -i -E "s/(CACHE\s*=\s*'pnimit-v)[^']+(')/\1${APP_VER}\2/" sw.js
              fi
              ;;
            Geriatrics)
              sed -i -E "s/(APP_VERSION\s*=\s*')[^']+(')/\1${APP_VER}\2/" shlav-a-mega.html
              sed -i -E "s/(CACHE\s*=\s*'shlav-a-v)[^']+(')/\1${APP_VER}\2/" sw.js
              ;;
            *)
              echo "::error::version_trinity not implemented for ${{ inputs.target_repo }}"; exit 1
              ;;
          esac
          git diff --stat

      # ── Fix template: investigate (Claude-driven) ─────────────────
      # Claude Code CLI in headless mode. Reads the auto-audit issue,
      # audits the relevant code paths, applies a minimal surgical fix,
      # and leaves the working tree dirty. The downstream test + PR
      # steps run the same gates as the deterministic templates.
      #
      # Hard guardrails baked into the prompt:
      #   - Cannot touch shared-engine files (fsrs.js, harrison_chapters.json, drugs.json)
      #   - Cannot bump version numbers (version_trinity owns that)
      #   - Must run `npx vitest run` before declaring done
      #   - Bails to /tmp/investigate-failure.md if no safe fix is found
      - name: Fetch issue context (investigate)
        if: inputs.fix_kind == 'investigate'
        env:
          GH_TOKEN: ${{ secrets.MONITOR_PAT }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/issue
          curl -sf -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Eiasash/${{ inputs.target_repo }}/issues/${{ inputs.issue_number }}" \
            > /tmp/issue/raw.json
          jq -r '.title // ""' /tmp/issue/raw.json > /tmp/issue/title.txt
          jq -r '.body  // ""' /tmp/issue/raw.json > /tmp/issue/body.txt
          jq -r '.labels[].name' /tmp/issue/raw.json > /tmp/issue/labels.txt || true
          echo "Title: $(cat /tmp/issue/title.txt)"
          echo "Body: $(wc -c < /tmp/issue/body.txt) chars"
          echo "Labels:" && cat /tmp/issue/labels.txt

      - name: Install Claude Code CLI
        if: inputs.fix_kind == 'investigate'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude (investigate)
        if: inputs.fix_kind == 'investigate'
        working-directory: target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          # Build prompt file with issue context. Heredoc with a quoted
          # delimiter ('PROMPT') prevents shell expansion of $VARS inside
          # the prompt body — critical because the issue body may contain
          # backticks, dollar signs, etc.
          cat > /tmp/prompt.md <<'PROMPT_HEAD'
          You are auto-audit's Tier 2 investigate template, running headless inside the cloned target repo.
          Auto-audit's Tier 1 cron filed an issue against this repo. Read it carefully, audit the
          relevant code paths, and apply the SMALLEST possible fix.

          Hard constraints — violations are unrecoverable failures:

          1. NEVER edit any of these files (lane discipline — managed by sibling_sync):
             - shared/fsrs.js
             - harrison_chapters.json
             - drugs.json
          2. NEVER bump version numbers anywhere — package.json version, APP_VERSION constants,
             sw.js CACHE strings. The version_trinity template owns those. If a version mismatch
             is the root cause, write that finding to /tmp/investigate-failure.md and stop.
          3. NEVER force-push or rewrite history. Just edit files; the runner commits.
          4. ALWAYS run `npx vitest run` before declaring done. If tests fail, iterate up to
             three times. If still failing after the third attempt, write the failure to
             /tmp/investigate-failure.md and stop without committing.
          5. PREFER no diff over a wrong diff. If the issue is unclear or the fix is risky,
             write your analysis to /tmp/investigate-failure.md and stop. The runner detects
             zero-diff and exits cleanly with no PR.
          6. After fixing, write a one-paragraph summary of what changed and why to
             /tmp/investigate-summary.md. The runner uses this as the PR body.

          Issue context:

          ---
          PROMPT_HEAD
          {
            echo "TITLE: $(cat /tmp/issue/title.txt)"
            echo ""
            echo "LABELS: $(tr '\n' ',' < /tmp/issue/labels.txt | sed 's/,$//')"
            echo ""
            echo "BODY:"
            cat /tmp/issue/body.txt
            echo ""
            echo "---"
            echo ""
            echo "Repo: Eiasash/${TARGET_REPO}"
            echo "Issue: #${ISSUE_NUM}"
          } >> /tmp/prompt.md

          echo "=== prompt size: $(wc -c < /tmp/prompt.md) chars ==="

          # Headless Claude. --print emits final response then exits.
          # --max-turns prevents runaway loops if the agent gets stuck.
          # --model: Sonnet 4.6 (codebase memory: surgical fixes don't need Opus).
          # Allow it to read/write files and run npm/npx; deny everything else.
          claude \
            --print \
            --max-turns 30 \
            --model claude-sonnet-4-6 \
            --permission-mode bypassPermissions \
            --dangerously-skip-permissions \
            < /tmp/prompt.md \
          | tee /tmp/claude-output.txt

          # If Claude bailed with a failure note, surface it and exit cleanly.
          # The PR-open step will see no diff and skip without producing an empty PR.
          if [ -f /tmp/investigate-failure.md ]; then
            echo "::warning::Claude bailed without a fix. See /tmp/investigate-failure.md:"
            cat /tmp/investigate-failure.md
            # Reset any partial edits so the PR step bails on zero-diff.
            git reset --hard HEAD
          fi

          # Show what changed for the run log.
          echo "=== diffstat ==="
          git diff --stat || true

      # ── Quality gate: tests still pass after the fix ───────────────
      - name: Run tests
        working-directory: target
        run: |
          if [ -f package.json ] && grep -q '"vitest"' package.json; then
            npx vitest run --reporter=default
          else
            echo "No vitest detected, skipping"
          fi

      # ── PR back to target repo ─────────────────────────────────────
      - name: Open PR with the fix
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.MONITOR_PAT }}
          FIX_KIND: ${{ inputs.fix_kind }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          set -euo pipefail
          BR="auto-fix/${FIX_KIND}-issue-${ISSUE_NUM}-$(date -u +%Y%m%d%H%M)"
          git config user.email "auto-audit-bot@users.noreply.github.com"
          git config user.name  "auto-audit-bot"
          git checkout -b "$BR"
          # If the fix produced no diff (e.g. version_trinity was already
          # in sync), there's nothing to push. Bail cleanly so the run is
          # green and no empty PR is opened.
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes — version_trinity was already in sync. Nothing to PR."
            exit 0
          fi
          git add -A
          # Multi-line commit message via heredoc — YAML inside `run: |`
          # demands every continuation line be indented; using a heredoc
          # keeps shell syntax clean and YAML happy.
          MSG=$(cat <<EOF
          auto-fix: ${FIX_KIND} (closes #${ISSUE_NUM})

          Auto-generated by Eiasash/auto-audit Tier 2 dispatcher.
          EOF
          )
          # Strip the leading-whitespace alignment that the heredoc inherits
          # from YAML indentation.
          MSG=$(printf '%s' "$MSG" | sed 's/^          //')
          git commit -m "$MSG"
          git push --set-upstream origin "$BR"
          # Open PR via the API (no gh CLI dependency)
          # For `investigate`, prefer Claude's own summary if it produced one.
          if [ "$FIX_KIND" = "investigate" ] && [ -f /tmp/investigate-summary.md ]; then
            BODY=$(printf 'Auto-generated by Tier 2 investigate (Claude headless).\n\n## Summary\n%s\n\n---\nTrigger: workflow_dispatch from `Eiasash/auto-audit`.\nClosed issue: #%s\n\nReview the diff carefully — Claude is fallible. Tier 2 never bypasses CI.' \
              "$(cat /tmp/investigate-summary.md)" "$ISSUE_NUM")
          else
            BODY=$(printf 'Auto-generated fix.\n\nTrigger: workflow_dispatch from `Eiasash/auto-audit`.\nKind: `%s`\nClosed issue: #%s\n\nReview the diff before merging. Tier 2 never bypasses CI.' \
              "$FIX_KIND" "$ISSUE_NUM")
          fi
          curl -sf -H "Authorization: token $MONITOR_PAT" \
            -H "Accept: application/vnd.github+json" \
            -X POST "https://api.github.com/repos/Eiasash/${TARGET_REPO}/pulls" \
            -d "$(jq -n --arg t "auto-fix: ${FIX_KIND}" --arg b "$BODY" --arg h "$BR" \
                  '{title:$t,body:$b,head:$h,base:"main"}')"
